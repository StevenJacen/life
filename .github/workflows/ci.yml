name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Fix lockfile registry for backend
        working-directory: backend
        run: sed -i 's|https://registry.npmmirror.com/|https://registry.npmjs.org/|g' package-lock.json

      - name: Fix lockfile registry for frontend
        working-directory: frontend
        run: sed -i 's|https://registry.npmmirror.com/|https://registry.npmjs.org/|g' package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Seed backend database
        working-directory: backend
        run: node db/seed.js

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: backend
        run: nohup node server.js > backend.log 2>&1 &

      - name: Start frontend dev server
        working-directory: frontend
        run: nohup npx next dev > frontend.log 2>&1 &

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:3001/api/life > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            echo "Backend not ready yet, retrying..."
            sleep 2
          done

          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            echo "Frontend not ready yet, retrying..."
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=list,html

      - name: Print Playwright errors
        if: failure()
        working-directory: frontend
        run: |
          for f in test-results/*/error-context.md; do
            echo "=== $f ==="
            cat "$f" || true
            echo ""
          done
          for f in test-results/*/test-failed-1.png; do
            echo "Screenshot: $f"
          done

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
