name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Fix lockfile registry for backend
        working-directory: backend
        run: sed -i 's|https://registry.npmmirror.com/|https://registry.npmjs.org/|g' package-lock.json

      - name: Fix lockfile registry for frontend
        working-directory: frontend
        run: sed -i 's|https://registry.npmmirror.com/|https://registry.npmjs.org/|g' package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          rm -f package-lock.json
          npm install --registry https://registry.npmjs.org/ --verbose 2>&1 | tee npm-install.log || (tail -n 200 npm-install.log && exit 1)

      - name: Upload npm install log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-log
          path: frontend/npm-install.log

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: backend
        run: nohup node server.js > backend.log 2>&1 &

      - name: Start frontend dev server
        working-directory: frontend
        run: nohup npx next dev > frontend.log 2>&1 &

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:3001/api/life > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            echo "Backend not ready yet, retrying..."
            sleep 2
          done

          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            echo "Frontend not ready yet, retrying..."
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
